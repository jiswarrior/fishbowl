let currentLang = "zh_CN";
function applyLanguage(lang) {
  if(!contentMap[lang]) lang = "zh_CN";
  currentLang = lang;
  const t = contentMap[lang];
  // 更新页面静态文本
  document.getElementById("siteTitle").innerText = t.site.title;
  document.getElementById("siteSub").innerText = t.site.subtitle;
  document.getElementById("badgeText").innerText = t.site.badge;
  document.getElementById("bannerTitleMain").innerText = t.site.bannerMain;
  document.getElementById("bannerSubMain").innerText = t.site.bannerSub;
  document.getElementById("bannerDesc").innerText = t.site.bannerDesc;
  document.getElementById("ctaBtn").innerText = t.site.cta;
  document.getElementById("ctaCommunityBtn").innerText = t.site.ctaCommunity;
  document.getElementById("footerText").innerText = t.site.footer;
  document.getElementById("footerLangNote").innerHTML = t.site.footerNote;
  // 更新导航栏文本
  document.querySelectorAll("[data-nav-key]").forEach(el => {
    const key = el.getAttribute("data-nav-key");
    if(t.nav[key]) el.innerText = t.nav[key];
  });
  // 渲染动态内容（带独立链接）
  renderDynamicContent(t);
  // 更新语言按钮激活状态
  document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.lang === lang));
}
